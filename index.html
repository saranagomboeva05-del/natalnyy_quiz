<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Натальный квиз компании</title>
<style>
  :root{
    --ink:#0b0d24;
    --ink-2:#13163a;
    --panel:#191c47;
    --panel-soft:#222659;
    --gold:#e6c068;
    --gold-soft:#f0d79a;
    --rose:#d98aa0;
    --lav:#cfd0f0;
    --lav-dim:#9698c9;
    --green:#7fd6a0;
    --red:#e98b8b;
    --line:rgba(230,192,104,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #2a2061 0%, transparent 55%),
      radial-gradient(900px 500px at 5% 110%, #1c2a55 0%, transparent 50%),
      var(--ink);
    color:var(--lav);
    min-height:100vh;
    line-height:1.5;
    overflow-x:hidden;
  }
  /* star field */
  .stars{position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.6}
  .stars span{position:absolute; width:2px;height:2px;border-radius:50%;background:#fff;
    animation:tw 4s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:.9;transform:scale(1.1)}}
  @media (prefers-reduced-motion: reduce){.stars span{animation:none}}

  .wrap{position:relative; z-index:1; max-width:680px; margin:0 auto; padding:28px 20px 80px}

  .display{font-family:Georgia,"Times New Roman",serif}

  /* top bar */
  .bar{display:flex; align-items:center; gap:14px; margin-bottom:22px}
  .bar .round{
    font-size:12px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--gold); white-space:nowrap}
  .track{flex:1; height:3px; background:rgba(255,255,255,.08); border-radius:99px; overflow:hidden}
  .track i{display:block; height:100%; width:0;
    background:linear-gradient(90deg,var(--rose),var(--gold)); border-radius:99px;
    transition:width .4s ease}
  .score{font-size:13px; color:var(--lav-dim); white-space:nowrap}
  .score b{color:var(--gold-soft)}

  /* card */
  .card{
    background:linear-gradient(180deg,var(--panel),var(--ink-2));
    border:1px solid var(--line);
    border-radius:20px; padding:26px 22px 22px;
    box-shadow:0 30px 60px -30px rgba(0,0,0,.7);
  }
  .qnum{font-family:Georgia,serif; font-size:13px; color:var(--lav-dim); letter-spacing:.05em; margin-bottom:14px}
  .qnum b{color:var(--gold); font-style:italic}

  .ctx{
    border-left:2px solid var(--gold);
    padding:2px 0 2px 14px; margin-bottom:18px;
    font-size:14.5px; color:var(--lav-dim);
  }
  .ctx p{margin:3px 0}

  .qtext{font-family:Georgia,serif; font-size:21px; color:#fff; margin-bottom:20px; line-height:1.35}

  .opts{display:flex; flex-direction:column; gap:11px}
  .opt{
    display:flex; align-items:center; gap:14px;
    width:100%; text-align:left; cursor:pointer;
    background:var(--panel-soft); color:var(--lav);
    border:1px solid rgba(255,255,255,.08); border-radius:14px;
    padding:14px 16px; font-size:16px; font-family:inherit;
    transition:transform .12s ease, border-color .2s ease, background .2s ease;
  }
  .opt:hover:not(:disabled){border-color:var(--gold); transform:translateY(-1px)}
  .opt:focus-visible{outline:2px solid var(--gold); outline-offset:2px}
  .opt .key{
    flex:none; width:30px;height:30px;border-radius:50%;
    display:grid;place-items:center; font-family:Georgia,serif; font-size:15px;
    background:rgba(230,192,104,.12); color:var(--gold); border:1px solid var(--line)}
  .opt .lbl{flex:1}
  .opt:disabled{cursor:default}
  .opt.correct{background:rgba(127,214,160,.16); border-color:var(--green); color:#eafff1}
  .opt.correct .key{background:var(--green); color:#06301a; border-color:var(--green)}
  .opt.wrong{background:rgba(233,139,139,.14); border-color:var(--red); color:#ffeaea}
  .opt.wrong .key{background:var(--red); color:#3a0c0c; border-color:var(--red)}
  .opt.muted{opacity:.5}

  .note{margin-top:16px; font-size:14px; color:var(--lav-dim);
    background:rgba(255,255,255,.04); border-radius:12px; padding:12px 14px; display:none}
  .note.show{display:block}
  .note b{color:var(--gold-soft)}

  .next{
    margin-top:18px; width:100%;
    background:linear-gradient(90deg,var(--gold),var(--gold-soft));
    color:#241a05; border:none; border-radius:14px;
    padding:15px; font-size:16px; font-weight:700; font-family:inherit;
    cursor:pointer; display:none; letter-spacing:.02em;
    transition:filter .15s ease, transform .12s ease}
  .next.show{display:block}
  .next:hover{filter:brightness(1.06); transform:translateY(-1px)}
  .next:focus-visible{outline:2px solid #fff; outline-offset:2px}

  /* intro + result */
  .hero{text-align:center; padding-top:30px}
  .glyph{font-size:40px; color:var(--gold); letter-spacing:.3em; margin-bottom:18px}
  .hero h1{font-family:Georgia,serif; font-size:38px; line-height:1.1; color:#fff; margin-bottom:8px}
  .hero h1 em{color:var(--gold); font-style:italic}
  .hero .sub{color:var(--lav-dim); font-size:16px; max-width:440px; margin:0 auto 26px}
  .rounds{text-align:left; max-width:420px; margin:0 auto 28px; display:flex; flex-direction:column; gap:2px}
  .rounds li{list-style:none; display:flex; gap:14px; align-items:baseline;
    padding:11px 4px; border-bottom:1px solid rgba(255,255,255,.06); font-size:15px}
  .rounds li span{font-family:Georgia,serif; color:var(--gold); font-style:italic; min-width:24px}
  .rounds li small{margin-left:auto; color:var(--lav-dim); font-size:13px}
  .start{
    background:linear-gradient(90deg,var(--rose),var(--gold));
    color:#241a05; border:none; border-radius:99px;
    padding:16px 42px; font-size:17px; font-weight:700; font-family:inherit; cursor:pointer;
    transition:transform .12s ease, filter .15s}
  .start:hover{transform:translateY(-2px); filter:brightness(1.05)}
  .start:focus-visible{outline:2px solid #fff; outline-offset:3px}

  .result h1{font-family:Georgia,serif; font-size:30px; color:#fff; margin-bottom:6px}
  .scorebig{font-family:Georgia,serif; font-size:64px; color:var(--gold); margin:10px 0}
  .scorebig small{font-size:24px; color:var(--lav-dim)}
  .verdict{font-size:17px; color:var(--lav); max-width:430px; margin:0 auto 26px}
  .verdict b{color:var(--gold-soft)}

  .hidden{display:none}
  footer{text-align:center; margin-top:34px; font-size:12px; color:var(--lav-dim); opacity:.7}
</style>
</head>
<body>
<div class="stars" id="stars" aria-hidden="true"></div>

<div class="wrap">

  <!-- INTRO -->
  <section id="intro" class="hero">
    <div class="glyph display">☉ ☽ ♀</div>
    <h1 class="display">Натальный<br><em>квиз компании</em></h1>
    <p class="sub">Угадайте друг друга по планетам, домам и характеру. 70 вопросов, шесть раундов и спецуровень с цитатами.</p>
    <ul class="rounds display" id="roundList"></ul>
    <button class="start" id="startBtn">Начать квиз →</button>
    <footer>Работает офлайн · без интернета, регистрации и VPN</footer>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <div class="bar">
      <div class="round display" id="roundLabel">Раунд 1</div>
      <div class="track"><i id="bar"></i></div>
      <div class="score">Очки <b id="score">0</b></div>
    </div>

    <div class="card">
      <div class="qnum display" id="qnum"></div>
      <div class="ctx" id="ctx"></div>
      <div class="qtext display" id="qtext"></div>
      <div class="opts" id="opts"></div>
      <div class="note" id="note"></div>
      <button class="next" id="nextBtn">Дальше →</button>
    </div>
    <footer>Вопрос <span id="ofText"></span></footer>
  </section>

  <!-- RESULT -->
  <section id="result" class="hidden hero result">
    <div class="glyph display">✦</div>
    <h1 class="display">Звёзды посчитаны</h1>
    <div class="scorebig display"><span id="finalScore">0</span><small id="finalTotal"></small></div>
    <p class="verdict" id="verdict"></p>
    <button class="start" id="againBtn">Сыграть заново</button>
  </section>

</div>

<script>
/* ---------- данные квиза ---------- */
const QUIZ = [
  // ===== Раунд 1: Планеты =====
  {r:"Раунд 1 · Планеты", ctx:["Солнце показывает характер и то, каким человек хочет быть.","Лев любит быть ярким, творческим и заметным."], q:"У кого Солнце во Льве?", o:["Саша","Яна","Герман","Антон"], c:[1]},
  {r:"Раунд 1 · Планеты", ctx:["Солнце — главные качества личности.","Рыбы связаны с фантазией, эмпатией и сильной интуицией."], q:"У кого Солнце в Рыбах?", o:["Вова","Антон","Алена","Юра"], c:[1]},
  {r:"Раунд 1 · Планеты", ctx:["Луна показывает эмоции и внутренний мир.","Козерог делает чувства сдержанными и рациональными."], q:"У кого Луна в Козероге?", o:["Маша","Юля","Герман","Оля"], c:[0]},
  {r:"Раунд 1 · Планеты", ctx:["Луна отвечает за эмоциональные реакции.","Овен реагирует быстро, честно и импульсивно."], q:"У кого Луна в Овне?", o:["Юля","Юра","Антон","У всех троих"], c:[3], note:"Луна в Овне у всех вариантов сразу."},
  {r:"Раунд 1 · Планеты", ctx:["Меркурий отвечает за мышление и общение.","Дева любит порядок, детали и анализ."], q:"Кто единственный с Меркурием в Деве?", o:["Юля","Оля","Маша","Яна"], c:[0]},
  {r:"Раунд 1 · Планеты", ctx:["Венера показывает любовь, симпатии и вкус.","Скорпион любит глубину, страсть и сильные чувства."], q:"У кого Венера в Скорпионе?", o:["Оля","Юля","Герман","Юра"], c:[0]},
  {r:"Раунд 1 · Планеты", ctx:["Марс показывает, как человек действует.","Стрелец предпочитает свободу, движение и приключения."], q:"У кого Марс в Стрельце?", o:["Антон","Герман","Юля","Вова"], c:[0]},
  {r:"Раунд 1 · Планеты", ctx:["Юпитер показывает, где легче расти и ловить удачу.","Скорпион помогает добиваться успеха упорством."], q:"У скольких участников Юпитер в Скорпионе?", o:["2","3","4","5"], c:[1]},
  {r:"Раунд 1 · Планеты", ctx:["Сатурн показывает дисциплину и жизненные уроки.","Водолей учит мыслить самостоятельно."], q:"У кого Сатурн в Водолее?", o:["Вова","Герман","Юра","Антон"], c:[0]},
  {r:"Раунд 1 · Планеты", ctx:["Раху показывает направление развития души.","Во Льве важно научиться проявлять себя."], q:"У кого Раху во Льве?", o:["Герман","Юля","Маша","Оля"], c:[0]},

  // ===== Раунд 2: Дома =====
  {r:"Раунд 2 · Дома", ctx:["Дома отвечают на вопрос «в какой сфере жизни?».","1 дом — первое впечатление; Дева делает человека аккуратным."], q:"У кого 1 дом в Деве?", o:["Юля","Маша","Саша","И Маша, и Юля"], c:[3]},
  {r:"Раунд 2 · Дома", ctx:["1 дом — каким человека видят окружающие.","Лев любит казаться уверенным и ярким."], q:"Кто единственный с 1 домом во Льве?", o:["Саша","Юра","Вова","Алена"], c:[1]},
  {r:"Раунд 2 · Дома", ctx:["4 дом — дом, семья и безопасность.","Рыбы делают атмосферу семьи тонкой и эмоциональной."], q:"У кого 4 дом в Рыбах?", o:["Оля","Герман","Антон","Яна"], c:[0]},
  {r:"Раунд 2 · Дома", ctx:["5 дом — творчество, романтика, удовольствия.","Рыбы дают богатую фантазию."], q:"У кого 5 дом в Рыбах?", o:["Маша","Яна","Юля","Герман"], c:[1]},
  {r:"Раунд 2 · Дома", ctx:["6 дом — работа и ежедневные обязанности.","Лев любит работать заметно и по-своему."], q:"У кого 6 дом во Льве?", o:["Вова","Саша","И Вова, и Саша","Юра"], c:[2]},
  {r:"Раунд 2 · Дома", ctx:["7 дом — партнёрство и отношения.","Скорпион ищет глубокие и серьёзные связи."], q:"У кого 7 дом в Скорпионе?", o:["Саша","Антон","Алена","Оля"], c:[0]},
  {r:"Раунд 2 · Дома", ctx:["8 дом — кризисы, трансформации, общие ресурсы.","Стрелец делает оптимистом даже в сложностях."], q:"У кого 8 дом в Стрельце?", o:["Герман","Саша","У обоих","Ни у кого"], c:[2]},
  {r:"Раунд 2 · Дома", ctx:["10 дом — карьера и репутация.","Близнецы дают связи, информацию и переключаемость."], q:"У кого 10 дом в Близнецах?", o:["Вова","Герман","Юля","Саша"], c:[2]},
  {r:"Раунд 2 · Дома", ctx:["11 дом — друзья и единомышленники.","Дева любит порядок даже среди друзей: помнит дни рождения."], q:"У кого 11 дом в Деве?", o:["Яна","Юля","Вова","Маша"], c:[0]},
  {r:"Раунд 2 · Дома", ctx:["12 дом — тайны, внутренний мир, подсознание.","Водолей делает мышление необычным даже втайне."], q:"У кого 12 дом в Водолее?", o:["Вова","Саша","Маша","Герман"], c:[0]},

  // ===== Раунд 3: Угадай по описанию =====
  {r:"Раунд 3 · Угадай человека", ctx:["Любит быть заметным, внутри собран и серьёзен, действует смело.","Солнце во Льве · Луна в Козероге · Марс во Льве"], q:"Кто это?", o:["Маша","Юля","Герман","Оля"], c:[0]},
  {r:"Раунд 3 · Угадай человека", ctx:["Редко спорит ради спора, спокоен, понимает мотивы людей, но переубедить почти невозможно.","Солнце в Рыбах · Луна в Овне · Юпитер в Стрельце · Сатурн в Рыбах"], q:"Кто это?", o:["Герман","Антон","Юра","Саша"], c:[1]},
  {r:"Раунд 3 · Угадай человека", ctx:["Производит впечатление дипломата, но в чувствах любит глубину и интенсивность.","Солнце в Весах · Венера в Скорпионе"], q:"Кто это?", o:["Оля","Юля","Яна","Маша"], c:[0]},
  {r:"Раунд 3 · Угадай человека", ctx:["Чемпион по перепискам и разговорам.","Солнце, Венера и Марс в Близнецах"], q:"Кто это?", o:["Юра","Вова","Герман","Саша"], c:[0]},
  {r:"Раунд 3 · Угадай человека", ctx:["Учитывает мнения, чувствителен к атмосфере, любит идеи, но в отношениях требователен.","Луна в Рыбах · Марс в Близнецах · Венера в Деве · 1 дом в Весах"], q:"Кто это?", o:["Яна","Оля","Юля","Маша"], c:[0]},
  {r:"Раунд 3 · Угадай человека", ctx:["Кажется домашним, но следит за балансом в отношениях, заботится, замечает детали.","Солнце в Раке · Луна в Весах · Венера в Деве"], q:"Кто это?", o:["Саша","Герман","Юра","Антон"], c:[0]},
  {r:"Раунд 3 · Угадай человека", ctx:["Проявляет себя ярко, действует быстро, при этом заботлив.","Солнце во Льве · Луна в Овне · Венера в Раке"], q:"Кто это?", o:["Юля","Маша","Яна","Оля"], c:[0]},
  {r:"Раунд 3 · Угадай человека", ctx:["Выглядит надёжным, любит устойчивость, но к цели идёт очень настойчиво.","Солнце в Рыбах · Луна в Тельце · Марс в Скорпионе"], q:"Кто это?", o:["Герман","Антон","Саша","Вова"], c:[0]},
  {r:"Раунд 3 · Угадай человека", ctx:["Кажется спокойным, но копает до сути и задаёт неудобные точные вопросы.","Солнце · Меркурий · Юпитер — всё в Скорпионе"], q:"Кто это?", o:["Вова","Юра","Герман","Антон"], c:[0]},
  {r:"Раунд 3 · Угадай человека", ctx:["И душа компании, и её архив: помнит события лучше участников.","Солнце во Льве · Луна в Козероге · Меркурий во Льве"], q:"Кто это?", o:["Маша","Юля","Яна","Оля"], c:[0]},
  {r:"Раунд 3 · Угадай человека", ctx:["Поддержит разговор на любую тему, интересов больше, чем времени.","Солнце · Венера · Марс — всё в Близнецах"], q:"Кто это?", o:["Юра","Герман","Саша","Антон"], c:[0]},

  // ===== Раунд 4: Кто вероятнее всего =====
  {r:"Раунд 4 · Кто вероятнее всего", ctx:["Солнце, Венера и Марс в Близнецах"], q:"Кто начнёт разговор с незнакомцем в очереди просто от скуки?", o:["Юра","Оля","Герман","Вова"], c:[0]},
  {r:"Раунд 4 · Кто вероятнее всего", ctx:["Луна в Козероге"], q:"Кто скажет «Я справлюсь сам», даже когда помощь уже предлагают?", o:["Маша","Юля","Герман","И Маша, и Юля"], c:[0]},
  {r:"Раунд 4 · Кто вероятнее всего", ctx:["Солнце и Марс во Льве"], q:"Кто окажется в центре внимания и соберёт вокруг себя половину гостей?", o:["Маша","Юля","Оба","Герман"], c:[0]},
  {r:"Раунд 4 · Кто вероятнее всего", ctx:["Сильный Скорпион в карте"], q:"Кто скажет «всё нормально», а через полгода выиграет спор со скриншотами?", o:["Вова","Юра","Герман","Оля"], c:[0]},
  {r:"Раунд 4 · Кто вероятнее всего", ctx:["Марс в Стрельце"], q:"Кто предложит внезапно сорваться в путешествие?", o:["Антон","Герман","Оба","Юля"], c:[0]},

  // ===== Раунд 5: Статистика =====
  {r:"Раунд 5 · Статистика", ctx:["Солнце — главная энергия личности компании."], q:"Какой знак Солнца встречается чаще всего?", o:["Рыбы","Скорпион","Лев","Близнецы"], c:[2]},
  {r:"Раунд 5 · Статистика", ctx:["Луна — эмоциональные реакции."], q:"Какой знак Луны чаще всего в компании?", o:["Рыбы","Овен","Скорпион","Козерог"], c:[1]},
  {r:"Раунд 5 · Статистика", ctx:["Плутон связан с поколением и глубинными переменами."], q:"Сколько участников из поколения Плутона в Скорпионе?", o:["4","5","6","7"], c:[2]},
  {r:"Раунд 5 · Статистика", q:"Какой Меркурий самый распространённый?", o:["Рак","Лев","Водолей","Дева"], c:[0], note:"Рак — 3 человека: Яна, Саша, Юра."},
  {r:"Раунд 5 · Статистика", q:"Какая Венера встречается чаще всего?", o:["Лев","Близнецы","Водолей","Дева"], c:[3], note:"Дева — 3 человека: Маша, Яна, Саша."},

/* ---------- состояние ---------- */
const KEYS=["А","Б","В","Г"];
let idx=0, score=0, answered=false;
const $=id=>document.getElementById(id);

/* звёзды */
(function(){const s=$("stars");let h="";for(let i=0;i<70;i++){h+=`<span style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s"></span>`}s.innerHTML=h})();

/* список раундов на старте */
(function(){
  const seen=[]; const counts={};
  QUIZ.forEach(q=>{counts[q.r]=(counts[q.r]||0)+1; if(!seen.includes(q.r))seen.push(q.r)});
  $("roundList").innerHTML = seen.map((r,i)=>{
    const name=r.split("·")[1].trim();
    return `<li><span>${i+1}</span> ${name} <small>${counts[r]} вопр.</small></li>`;
  }).join("");
})();

function show(id){["intro","quiz","result"].forEach(s=>$(s).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo(0,0)}

function render(){
  const item=QUIZ[idx];
  answered=false;
  $("roundLabel").textContent=item.r.split("·")[0].trim()+" ·"+item.r.split("·")[1];
  $("bar").style.width=((idx)/QUIZ.length*100)+"%";
  $("score").textContent=score;
  $("qnum").innerHTML=`Вопрос <b>${idx+1}</b> из ${QUIZ.length}`;
  $("ofText").textContent=`${idx+1} / ${QUIZ.length}`;
  $("ctx").innerHTML = item.ctx ? item.ctx.map(p=>`<p>${p}</p>`).join("") : "";
  $("ctx").style.display = item.ctx ? "block" : "none";
  $("qtext").textContent=item.q;
  $("note").className="note"; $("note").textContent="";
  $("nextBtn").className="next";
  $("nextBtn").textContent = idx===QUIZ.length-1 ? "Показать результат →" : "Дальше →";

  const wrap=$("opts"); wrap.innerHTML="";
  item.o.forEach((opt,i)=>{
    const b=document.createElement("button");
    b.className="opt";
    b.innerHTML=`<span class="key">${KEYS[i]}</span><span class="lbl">${opt}</span>`;
    b.onclick=()=>choose(i);
    wrap.appendChild(b);
  });
}

function choose(i){
  if(answered)return; answered=true;
  const item=QUIZ[idx];
  const correct=item.c.includes(i);
  if(correct)score++;
  const btns=$("opts").querySelectorAll(".opt");
  btns.forEach((b,j)=>{
    b.disabled=true;
    if(item.c.includes(j))b.classList.add("correct");
    else if(j===i)b.classList.add("wrong");
    else b.classList.add("muted");
  });
  $("score").textContent=score;
  if(item.note){$("note").innerHTML=item.note;$("note").classList.add("show")}
  $("nextBtn").classList.add("show");
  $("bar").style.width=((idx+1)/QUIZ.length*100)+"%";
}

function next(){
  if(idx<QUIZ.length-1){idx++;render()}
  else finish();
}

function finish(){
  show("result");
  $("finalScore").textContent=score;
  $("finalTotal").textContent=" / "+QUIZ.length;
  const pct=score/QUIZ.length;
  let v;
  if(pct>=0.9) v="<b>Астролог компании.</b> Вы знаете эту банду лучше, чем их собственные натальные карты.";
  else if(pct>=0.7) v="<b>Сильный игрок.</b> Звёзды и характеры читаются легко — пара деталей ускользнула.";
  else if(pct>=0.5) v="<b>Хорошая интуиция.</b> Половина компании для вас — открытая книга.";
  else if(pct>=0.3) v="<b>Только знакомитесь.</b> Самое время узнать друзей поближе.";
  else v="<b>Загадочные звёзды.</b> Похоже, компанию ещё предстоит разгадать — сыграйте снова!";
  $("verdict").innerHTML=v;
}

$("startBtn").onclick=()=>{idx=0;score=0;render();show("quiz")};
$("nextBtn").onclick=next;
$("againBtn").onclick=()=>{idx=0;score=0;show("intro")};

/* клавиатура: 1-4 / А-Г выбор, Enter дальше */
document.addEventListener("keydown",e=>{
  if($("quiz").classList.contains("hidden"))return;
  if(e.key==="Enter" && answered){next();return}
  const map={"1":0,"2":1,"3":2,"4":3};
  if(map[e.key]!==undefined && !answered){choose(map[e.key])}
});
</script>
